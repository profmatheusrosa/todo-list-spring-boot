<div class="app-container">
  <div class="hero">
    <div class="logo-badge">TD</div>
    <div class="header-content">
      <h1>{{ title }}</h1>
      <div class="subtitle">Uma lista de tarefas simples e didática — crie, conclua e organize suas tarefas</div>
    </div>
    <button class="theme-toggle" (click)="toggleDarkMode()" [title]="isDarkMode ? 'Mudar para tema claro' : 'Mudar para tema escuro'">
      <svg *ngIf="!isDarkMode" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      <svg *ngIf="isDarkMode" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="17.78" x2="5.64" y2="16.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </button>
  </div>

  <section class="form-section">
    <h2>Nova tarefa</h2>
    <div class="form-card">
      <div class="field">
        <label for="title">Título</label>
        <input id="title" name="title" [(ngModel)]="newTask.title" placeholder="Digite o título" />
      </div>
      <div class="field">
        <label for="description">Descrição</label>
        <textarea id="description" name="description" [(ngModel)]="newTask.description" placeholder="Digite a descrição"></textarea>
      </div>
      <div class="actions">
        <button (click)="addTask()">Adicionar tarefa</button>
      </div>
    </div>
  </section>

  <section class="list-section">
    <h2>Minhas tarefas <span class="task-count">{{ tasks.length }}</span></h2>
    <div *ngIf="loading" class="state-message">
      <span class="spinner"></span>
      Carregando tarefas...
    </div>
    <div *ngIf="error" class="error state-message">{{ error }}</div>

    <div *ngIf="!loading && tasks.length === 0" class="empty state-message">
      ✨ Tudo limpo! Você não tem tarefas pendentes.
    </div>

    <ul>
      <li *ngFor="let task of tasks" [class.done]="task.done" [class.expanded]="task.expanded">
        <div class="task-top">
          <div class="task-info">
            <div class="title-row">
              <span class="toggle-circle" (click)="toggleExpand(task)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </span>
              <strong *ngIf="!task.isEditing" class="task-title-text">{{ task.title }}</strong>
              <input *ngIf="task.isEditing" #titleInput [(ngModel)]="task.title" class="edit-input-title focused" (keyup.enter)="saveEdit(task)" placeholder="Título da tarefa..." />
            </div>
            
            <div *ngIf="task.expanded" class="expand-content">
              <p *ngIf="!task.isEditing">{{ task.description }}</p>
              <textarea *ngIf="task.isEditing" [(ngModel)]="task.description" class="edit-input-desc" placeholder="Adicione uma descrição..."></textarea>
            </div>
          </div>

          <div class="buttons">
            <!-- Botão Alterar / Confirmar -->
            <button class="icon-btn" [class.edit]="!task.isEditing" [class.confirm]="task.isEditing" (click)="saveEdit(task)" [title]="task.isEditing ? 'Confirmar' : 'Alterar'">
              <svg *ngIf="!task.isEditing" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4L18.5 2.5z"></path></svg>
              <svg *ngIf="task.isEditing" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>

            <!-- Botão Cancelar (apenas durante edição) -->
            <button *ngIf="task.isEditing" class="icon-btn cancel" (click)="cancelEdit(task)" title="Cancelar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <!-- Botão Concluir/Reabrir -->
            <button class="icon-btn done" (click)="toggleDone(task)" [title]="task.done ? 'Reabrir' : 'Concluir'">
              <svg *ngIf="!task.done" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              <svg *ngIf="task.done" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"></path><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
            </button>

            <!-- Botão Remover -->
            <button class="icon-btn delete" (click)="deleteTask(task)" title="Remover">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
          </div>
        </div>
      </li>
    </ul>
  </section>
</div>
